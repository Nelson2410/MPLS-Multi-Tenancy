enable
configure terminal
hostname PE-2
!
ip vrf VPN_CLIENT_A
 rd 100:1
 route-target export 100:1
 route-target import 100:1
!
ip vrf VPN_CLIENT_B
 rd 200:1
 route-target export 200:1
 route-target import 200:1
!
mpls label protocol ldp
mpls ldp router-id Loopback0 force
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
 ip ospf 1 area 0
 ip ospf message-digest-key 1 md5 C1sc0MD5
 ip ospf authentication message-digest
!
interface Ethernet0/0
 description Vers P (Core)
 ip address 10.0.23.2 255.255.255.252
 ip ospf 1 area 0
 mpls ip
 ip ospf message-digest-key 1 md5 C1sc0MD5
 ip ospf authentication message-digest
 no shutdown
!
interface Ethernet0/1
 description Vers CE-A2 (Branche A1)
 ip vrf forwarding VPN_CLIENT_A
 ip address 172.16.20.1 255.255.255.252
 no shutdown
!
interface Ethernet0/2
 description Vers CE-A3 (Branche A2)
 ip vrf forwarding VPN_CLIENT_A
 ip address 172.16.30.1 255.255.255.252
 no shutdown
!
interface Ethernet0/3
 description Vers CE-B2 (Branche B1)
 ip vrf forwarding VPN_CLIENT_B
 ip address 192.168.20.1 255.255.255.252
 no shutdown
!
interface Ethernet1/0
 description Vers CE-B3 (Branche B2)
 ip vrf forwarding VPN_CLIENT_B
 ip address 192.168.30.1 255.255.255.252
 no shutdown
!
router ospf 1
 router-id 3.3.3.3
!
router bgp 65000
 bgp log-neighbor-changes
 neighbor 1.1.1.1 remote-as 65000
 neighbor 1.1.1.1 update-source Loopback0
 neighbor 1.1.1.1 password C1sc0BGP
 !
 address-family vpnv4
  neighbor 1.1.1.1 activate
  neighbor 1.1.1.1 send-community extended
 exit-address-family
 !
 address-family ipv4 vrf VPN_CLIENT_A
  redistribute connected
  redistribute static
 exit-address-family
 !
 address-family ipv4 vrf VPN_CLIENT_B
  redistribute connected
  redistribute static
 exit-address-family
!
ip route vrf VPN_CLIENT_A 172.16.2.0 255.255.255.0 172.16.20.2
ip route vrf VPN_CLIENT_A 172.16.3.0 255.255.255.0 172.16.30.2
ip route vrf VPN_CLIENT_B 192.168.2.0 255.255.255.0 192.168.20.2
ip route vrf VPN_CLIENT_B 192.168.3.0 255.255.255.0 192.168.30.2
!
end
write memory
