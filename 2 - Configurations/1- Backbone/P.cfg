enable
configure terminal
hostname P
!
mpls label protocol ldp
mpls ldp router-id Loopback0 force
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
 ip ospf 1 area 0
!
interface Ethernet0/0
 description Vers PE-1
 ip address 10.0.12.2 255.255.255.252
 ip ospf 1 area 0
 mpls ip
 no shutdown
!
interface Ethernet0/1
 description Vers PE-2
 ip address 10.0.23.1 255.255.255.252
 ip ospf 1 area 0
 mpls ip
 no shutdown
!
router ospf 1
 router-id 2.2.2.2
!
end
write memory